html,body{margin:0;padding:0;height:100%;font-family:'Quicksand',sans-serif}
*{box-sizing:border-box}

.scr{overflow-y:auto;height:100%;width:100%;background:linear-gradient(135deg,#e0edff 0%,#fce4f0 50%,#e0edff 100%)}

.opt-btn.wrong{border-color:#ef4444;background:#fee2e2;animation:shake .4s}

.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700}
.badge-5{background:#fef3c7;color:#92400e}
.badge-6{background:#d1fae5;color:#065f46}

.vocab-row:hover{background:var(--ltblue)}
.rec-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:none}
.rec-btn:hover{transform:scale(1.1)}
.rec-btn.recording{background:#ef4444!important;animation:pulse-rec 1s infinite}
@keyframes pulse-rec{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.prog-bar{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pink),var(--blue));transition:width .4s}
.ipa{color:var(--gray);font-style:italic;font-size:14px}
b.hl{color:var(--pink);font-weight:700}
.tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px}
.tag-n{background:#dbeafe;color:#1e40af}
.tag-v{background:#fce7f3;color:#9d174d}

.fill-input:focus{border-color:var(--pink)}
.fill-input.correct{border-color:#10b981;background:#d1fae5}
.fill-input.wrong{border-color:#ef4444;background:#fee2e2}

// ============ DATA ============
const DATA = {
mirror: {
  name: "Mirror", emoji: "🪞",
  vocab: [
    {word:"look presentable",ipa:"/lʊk prɪˈzentəbl/",pos:"v",vi:"trông gọn gàng",en:"to look neat and tidy",ex:"I always try to look presentable before going out.",coll:"look presentable for work/an interview"},
    {word:"neat",ipa:"/niːt/",pos:"adj",vi:"gọn gàng, ngăn nắp",en:"tidy and in order",ex:"She always keeps her desk neat.",coll:"neat and tidy, neat appearance"},
    {word:"tidy",ipa:"/ˈtaɪdi/",pos:"adj",vi:"ngăn nắp",en:"arranged neatly and in order",ex:"His room is always tidy.",coll:"keep tidy, tidy up"},
    {word:"wrinkled",ipa:"/ˈrɪŋkld/",pos:"adj",vi:"nhăn nheo, nhàu",en:"having small lines or folds",ex:"He noticed his shirt was wrinkled.",coll:"wrinkled clothes/face"},
    {word:"a compact mirror",ipa:"/ə kəmˈpækt ˈmɪrər/",pos:"n",vi:"gương nhỏ cầm tay",en:"a small portable mirror",ex:"She carries a compact mirror in her bag.",coll:"carry a compact mirror"},
    {word:"come in handy",ipa:"/kʌm ɪn ˈhændi/",pos:"v",vi:"trở nên hữu ích",en:"to be useful when needed",ex:"A compact mirror can really come in handy.",coll:"come in handy for/when"},
    {word:"a decorative item",ipa:"/ə ˈdekərətɪv ˈaɪtəm/",pos:"n",vi:"vật trang trí",en:"an object used for decoration",ex:"Mirrors can be used as decorative items.",coll:"decorative item/piece"},
    {word:"nicely compliment",ipa:"/ˈnaɪsli ˈkɒmplɪment/",pos:"v",vi:"bổ sung, tôn lên vẻ đẹp",en:"to enhance the appearance of",ex:"A large mirror can nicely compliment a living room.",coll:"compliment a room/space"},
    {word:"give the illusion",ipa:"/ɡɪv ðə ɪˈluːʒən/",pos:"v",vi:"tạo ảo giác",en:"to create a false impression",ex:"Mirrors give the illusion that the space is bigger than it actually is.",coll:"give the illusion of/that"}
  ],
  mcq: [
    {q:"What does 'look presentable' mean?",opts:["Trông mệt mỏi","Trông gọn gàng","Trông buồn cười","Trông già"],ans:1,explain:"'Look presentable' nghĩa là trông gọn gàng, chỉnh tề (quần áo, đầu tóc). Ví dụ: I try to look presentable before meetings."},
    {q:"What is 'a compact mirror'?",opts:["Gương lớn treo tường","Gương soi toàn thân","Gương nhỏ cầm tay","Gương xe hơi"],ans:2,explain:"'A compact mirror' là gương nhỏ gọn có thể bỏ túi/ví, tiện mang theo."},
    {q:"'Come in handy' nghĩa là gì?",opts:["Trở nên đắt đỏ","Trở nên hữu ích","Trở nên nguy hiểm","Trở nên nhàm chán"],ans:1,explain:"'Come in handy' = trở nên hữu ích khi cần. VD: An umbrella comes in handy on rainy days."},
    {q:"'Give the illusion' nghĩa là gì?",opts:["Cho quà","Tạo ảo giác","Gây thất vọng","Mang lại niềm vui"],ans:1,explain:"'Give the illusion that...' = tạo ảo giác rằng... VD: Mirrors give the illusion of more space."},
    {q:"'Wrinkled' mô tả điều gì?",opts:["Mới mẻ, sáng bóng","Nhăn nheo, nhàu","Sạch sẽ, thơm tho","Mềm mại, mịn màng"],ans:1,explain:"'Wrinkled' nghĩa là nhăn nheo/nhàu, thường mô tả quần áo hoặc da."}
  ],
  fill: [
    {vi:"trông gọn gàng",ans:"look presentable",hint:"l___ p___"},
    {vi:"gương nhỏ cầm tay",ans:"a compact mirror",hint:"a c___ m___"},
    {vi:"trở nên hữu ích",ans:"come in handy",hint:"c___ in h___"},
    {vi:"tạo ảo giác",ans:"give the illusion",hint:"g___ the i___"},
    {vi:"vật trang trí",ans:"a decorative item",hint:"a d___ i___"}
  ],
  speaking: [
    {q:"Do you like looking at yourself in the mirror?",
     vocabHint:["look presentable","neat","wrinkled"],
     samples:[
       {band:"7.5",text:"I wouldn't say I'm vain, but I do glance in the mirror quite often, mainly to make sure I look presentable. There's nothing worse than realizing your shirt is wrinkled halfway through the day!",vi:"Tôi không nói là tôi kiêu ngạo, nhưng tôi có nhìn vào gương khá thường xuyên, chủ yếu để đảm bảo mình trông gọn gàng. Không có gì tệ hơn khi nhận ra áo mình nhăn nheo giữa chừng ngày."},
       {band:"8.0",text:"Definitely. I usually check the mirror to ensure my hair is neat and my clothes aren't wrinkled. It's just a quick habit before heading out that helps me feel confident.",vi:"Chắc chắn rồi. Tôi thường kiểm tra gương để đảm bảo tóc gọn gàng và quần áo không nhăn. Đó chỉ là thói quen nhanh trước khi ra ngoài giúp tôi cảm thấy tự tin."},
       {band:"9.0",text:"I do, actually. It's not about vanity, but rather about presenting myself well. I make sure I look presentable before leaving the house, checking that my appearance is neat and wrinkle-free.",vi:"Tôi có, thực ra. Không phải vì kiêu ngạo, mà là về việc trình bày bản thân tốt. Tôi đảm bảo mình trông gọn gàng trước khi rời nhà, kiểm tra ngoại hình gọn gàng và không nhăn."}
     ],
     explanation:"Câu trả lời Band 9.0 sử dụng cách diễn đạt tự nhiên ('I do, actually'), collocations mạnh ('look presentable'), và giải thích lý do cụ thể."},
    {q:"Have you ever bought a mirror?",
     vocabHint:["a compact mirror","a decorative item","nicely compliment"],
     samples:[
       {band:"7.5",text:"Yes, I picked up a compact mirror for travel. I also bought a large one as a decorative item for my room that nicely compliments the overall decor.",vi:"Vâng, tôi đã mua một chiếc gương nhỏ cho việc đi du lịch. Tôi cũng mua một chiếc lớn làm vật trang trí cho phòng, tôn lên vẻ đẹp tổng thể."},
       {band:"8.0",text:"Actually, yes. I bought a compact mirror for when I'm on the go, and more recently I acquired a round wall mirror as a decorative item that nicely compliments my bedroom.",vi:"Thực ra, có. Tôi mua một chiếc gương nhỏ khi di chuyển, và gần đây tôi có một chiếc gương tường tròn làm vật trang trí tôn lên phòng ngủ của tôi."},
       {band:"9.0",text:"Oh, for sure! I invested in a compact mirror for travel purposes, and I also purchased a decorative wall mirror that nicely compliments my living room's aesthetic.",vi:"Ồ, chắc chắn rồi! Tôi đã đầu tư vào một chiếc gương nhỏ cho mục đích du lịch, và tôi cũng mua một chiếc gương tường trang trí tôn lên thẩm mỹ phòng khách."}
     ],
     explanation:"Band 9.0 dùng 'invested in' thay 'bought' cho tinh tế hơn, và 'aesthetic' cho từ vựng nâng cao."},
    {q:"Do you usually take a mirror with you?",
     vocabHint:["a compact mirror","come in handy","look presentable"],
     samples:[
       {band:"7.5",text:"Yes, I always keep a compact mirror in my bag. It comes in handy when I need to check my appearance, especially before important meetings.",vi:"Vâng, tôi luôn giữ một chiếc gương nhỏ trong túi. Nó rất hữu ích khi tôi cần kiểm tra ngoại hình, đặc biệt trước các cuộc họp quan trọng."},
       {band:"8.0",text:"I do, actually. I keep a compact mirror in my bag at all times. It really comes in handy - for example, after lunch I like to make sure I still look presentable.",vi:"Tôi có, thực ra. Tôi giữ một chiếc gương nhỏ trong túi mọi lúc. Nó thực sự hữu ích - ví dụ, sau bữa trưa tôi thích đảm bảo mình vẫn trông gọn gàng."},
       {band:"9.0",text:"Absolutely, I make it a point to carry a compact mirror with me. It comes in handy in various situations, allowing me to ensure I look presentable throughout the day.",vi:"Tuyệt đối, tôi luôn mang theo một chiếc gương nhỏ. Nó hữu ích trong nhiều tình huống, cho phép tôi đảm bảo trông gọn gàng suốt ngày."}
     ],
     explanation:"Band 9.0 dùng 'make it a point to' cho sự chủ động, và 'throughout the day' cho tính liên tục."},
    {q:"Would you use mirrors to decorate your room?",
     vocabHint:["a decorative item","nicely compliment","give the illusion"],
     samples:[
       {band:"7.5",text:"Absolutely. A mirror can be a beautiful decorative item and give the illusion that the space is bigger than it actually is, which is perfect for smaller rooms.",vi:"Chắc chắn rồi. Một chiếc gương có thể là vật trang trí đẹp và tạo ảo giác không gian rộng hơn thực tế, hoàn hảo cho phòng nhỏ."},
       {band:"8.0",text:"Oh, for sure! I think a well-placed mirror can nicely compliment a living room or bedroom. Plus, they give the illusion that the space is bigger than it actually is.",vi:"Ồ, chắc chắn! Tôi nghĩ một chiếc gương đặt đúng chỗ có thể tôn lên phòng khách hoặc phòng ngủ. Ngoài ra, chúng tạo ảo giác không gian rộng hơn."},
       {band:"9.0",text:"Definitely, mirrors serve dual purposes in interior design. They function as decorative items that nicely compliment various room aesthetics, while also giving the illusion of expanded space.",vi:"Chắc chắn, gương phục vụ hai mục đích trong thiết kế nội thất. Chúng hoạt động như vật trang trí tôn lên nhiều phong cách phòng, đồng thời tạo ảo giác không gian mở rộng."}
     ],
     explanation:"Band 9.0 dùng 'dual purposes', 'interior design', 'function as' cho từ vựng chuyên ngành và cấu trúc phức tạp."}
  ]
},
views: {
  name: "Views", emoji: "🏔️",
  vocab: [
    {word:"stick with someone",ipa:"/stɪk wɪð/",pos:"v",vi:"ở lại trong trí nhớ",en:"to remain in someone's memory",ex:"That beautiful sunset has stuck with me ever since.",coll:"stick with me/you"},
    {word:"diverse landscapes",ipa:"/daɪˈvɜːs ˈlændskeɪps/",pos:"n",vi:"phong cảnh đa dạng",en:"varied natural scenery",ex:"Vietnam has incredibly diverse landscapes.",coll:"diverse landscapes/scenery"},
    {word:"be drawn to",ipa:"/biː drɔːn tuː/",pos:"v",vi:"bị thu hút bởi",en:"to be attracted to something",ex:"I'm always drawn to mountain views.",coll:"be drawn to something/someone"},
    {word:"unforgettable",ipa:"/ˌʌnfəˈɡetəbl/",pos:"adj",vi:"không thể quên",en:"impossible to forget",ex:"The view from the top was unforgettable.",coll:"unforgettable experience/view"},
    {word:"scenery",ipa:"/ˈsiːnəri/",pos:"n",vi:"phong cảnh",en:"the natural features of a landscape",ex:"The scenery in Da Lat is breathtaking.",coll:"beautiful/stunning scenery"},
    {word:"urban areas",ipa:"/ˈɜːbən ˈeəriəz/",pos:"n",vi:"khu vực thành thị",en:"city or town areas",ex:"Urban areas have impressive skylines.",coll:"urban/rural areas"},
    {word:"rural areas",ipa:"/ˈrʊərəl ˈeəriəz/",pos:"n",vi:"khu vực nông thôn",en:"countryside areas",ex:"I prefer the peaceful views in rural areas.",coll:"rural areas/communities"}
  ],
  mcq: [
    {q:"'Stick with someone' nghĩa là gì?",opts:["Dính vào ai đó","Ở lại trong trí nhớ","Đi theo ai đó","Gắn bó với ai"],ans:1,explain:"Trong ngữ cảnh views/memories, 'stick with me' nghĩa là hình ảnh/kỷ niệm đó in sâu trong trí nhớ."},
    {q:"'Be drawn to' nghĩa là?",opts:["Bị vẽ lên","Bị kéo đi","Bị thu hút bởi","Bị đẩy ra"],ans:2,explain:"'Be drawn to' = bị thu hút, bị hấp dẫn bởi điều gì đó. VD: I'm drawn to nature."},
    {q:"'Diverse landscapes' mô tả điều gì?",opts:["Phong cảnh giống nhau","Phong cảnh đa dạng","Phong cảnh buồn tẻ","Phong cảnh nhân tạo"],ans:1,explain:"'Diverse' = đa dạng, nhiều loại. 'Diverse landscapes' = phong cảnh phong phú, nhiều dạng."},
    {q:"Đâu là nghĩa của 'rural areas'?",opts:["Khu công nghiệp","Khu vực thành thị","Khu vực nông thôn","Khu thương mại"],ans:2,explain:"'Rural areas' = khu vực nông thôn, vùng quê, đối lập với 'urban areas' (thành thị)."}
  ],
  fill: [
    {vi:"ở lại trong trí nhớ",ans:"stick with",hint:"s___ w___"},
    {vi:"phong cảnh đa dạng",ans:"diverse landscapes",hint:"d___ l___"},
    {vi:"bị thu hút bởi",ans:"be drawn to",hint:"be d___ t___"},
    {vi:"khu vực nông thôn",ans:"rural areas",hint:"r___ a___"}
  ],
  speaking: [
    {q:"Have you seen an unforgettable and beautiful view or scenery?",
     vocabHint:["stick with someone","unforgettable","scenery"],
     samples:[
       {band:"7.5",text:"Definitely. The scenery in Sapa was unforgettable. The rice terraces and mountains have really stuck with me ever since.",vi:"Chắc chắn rồi. Phong cảnh ở Sapa thật khó quên. Những ruộng bậc thang và núi non thực sự in sâu trong tôi từ đó."},
       {band:"8.0",text:"Oh absolutely. I visited Ha Long Bay a couple of years ago and the view from the boat at sunrise was truly unforgettable. The way the limestone karsts emerged from the mist has stuck with me ever since.",vi:"Ồ chắc chắn rồi. Tôi thăm Vịnh Hạ Long vài năm trước và khung cảnh từ thuyền lúc bình minh thực sự khó quên. Cách những núi đá vôi limestone karsts hiện ra từ sương mù đã in sâu trong tôi từ đó."},
       {band:"9.0",text:"I have indeed. The most memorable view I've encountered was during my trip to Fansipan, where the scenery at dawn was absolutely breathtaking. The interplay of mist-covered mountains and the first rays of sunlight has stuck with me profoundly.",vi:"Tôi thực sự có. Khung cảnh đáng nhớ nhất tôi từng gặp là trong chuyến đi Fansipan, nơi phong cảnh lúc bình minh tuyệt đẹp. Sự tương tác giữa núi mây mù và những tia nắng đầu tiên đã in sâu trong tôi một cách sâu sắc."}
     ],
     explanation:"Band 9.0 dùng 'interplay', 'profoundly' cho từ vựng nâng cao và cấu trúc phức tạp."},
    {q:"Do you prefer views in your own country or in other countries?",
     vocabHint:["diverse landscapes","be drawn to"],
     samples:[
       {band:"7.5",text:"I'd say I prefer views in Vietnam because we have such diverse landscapes — from beaches to mountains, you can experience everything within hours.",vi:"Tôi nói tôi thích khung cảnh ở Việt Nam hơn vì chúng ta có phong cảnh đa dạng - từ bãi biển đến núi, bạn có thể trải nghiệm mọi thứ trong vài giờ."},
       {band:"8.0",text:"Honestly, I'm more drawn to views in my own country. Vietnam has incredibly diverse landscapes — you can go from pristine beaches to terraced mountains within hours. That said, I wouldn't mind exploring views abroad either!",vi:"Thành thật mà nói, tôi bị thu hút nhiều hơn bởi khung cảnh ở đất nước của tôi. Việt Nam có phong cảnh cực kỳ đa dạng - bạn có thể đi từ bãi biển nguyên sơ đến núi bậc thang trong vài giờ. Dù vậy, tôi cũng không ngại khám phá khung cảnh nước ngoài!"},
       {band:"9.0",text:"While I appreciate scenic views worldwide, I find myself particularly drawn to those in Vietnam. Our diverse landscapes, ranging from coastal vistas to mountainous terrains, offer unparalleled variety that continually captivates me.",vi:"Mặc dù tôi đánh giá cao khung cảnh thiên nhiên trên toàn thế giới, tôi thấy mình đặc biệt bị thu hút bởi những khung cảnh ở Việt Nam. Phong cảnh đa dạng của chúng ta, từ cảnh quan ven biển đến địa hình núi non, mang lại sự đa dạng vô song liên tục thu hút tôi."}
     ],
     explanation:"Band 9.0 dùng 'unparalleled', 'continually captivates' cho từ vựng tinh tế và cấu trúc phức tạp."},
    {q:"Do you prefer views in urban areas or rural areas?",
     vocabHint:["urban areas","rural areas","be drawn to"],
     samples:[
       {band:"7.5",text:"I'd have to say rural areas, without a doubt. I'm naturally drawn to wide-open spaces and greenery. Don't get me wrong, city skylines can be stunning at night, but nothing beats the tranquility of the countryside.",vi:"Tôi phải nói vùng nông thôn, không nghi ngờ gì. Tôi tự nhiên bị thu hút bởi không gian rộng mở và màu xanh. Đừng hiểu lầm, đường chân trời thành phố có thể tuyệt đẹp vào ban đêm, nhưng không gì sánh bằng sự yên bình của vùng quê."},
       {band:"8.0",text:"I definitely prefer rural areas. The peaceful, natural scenery in the countryside is much more appealing to me than the concrete jungles of urban areas. There's something rejuvenating about being surrounded by nature.",vi:"Tôi chắc chắn thích vùng nông thôn hơn. Phong cảnh yên bình, tự nhiên ở vùng quê hấp dẫn tôi nhiều hơn những khu rừng bê tông của vùng đô thị. Có điều gì đó phục hồi sức khỏe khi được bao quanh bởi thiên nhiên."},
       {band:"9.0",text:"Rural areas undoubtedly hold more appeal for me. The serene landscapes, unspoiled by urbanization, provide a sense of peace and connection with nature that urban environments simply cannot replicate.",vi:"Vùng nông thôn chắc chắn có sức hấp dẫn hơn đối với tôi. Những cảnh quan thanh bình, không bị đô thị hóa làm hỏng, mang lại cảm giác bình yên và kết nối với thiên nhiên mà môi trường đô thị đơn giản không thể sao chép."}
     ],
     explanation:"Band 9.0 dùng 'undoubtedly', 'unspoiled', 'replicate' cho từ vựng học thuật và cấu trúc trang trọng."},
    {q:"Do you like taking pictures of different views?",
     vocabHint:["scenery","unforgettable","stick with someone"],
     samples:[
       {band:"7.5",text:"Absolutely, I'm a bit of a photography enthusiast actually. Whenever I come across stunning scenery, I can't resist snapping a few shots. It's a great way to make sure those unforgettable moments stick with me.",vi:"Chắc chắn rồi, thực ra tôi là một người đam mê nhiếp ảnh. Bất cứ khi nào tôi gặp phong cảnh tuyệt đẹp, tôi không thể cưỡng lại việc chụp vài tấm. Đó là cách tuyệt vời để đảm bảo những khoảnh khắc khó quên đó ở lại với tôi."},
       {band:"8.0",text:"Yes, I do! Whenever I see unforgettable scenery, I take photos so the memory sticks with me. It's wonderful to have visual reminders of beautiful places I've visited.",vi:"Vâng, tôi có! Bất cứ khi nào tôi thấy phong cảnh khó quên, tôi chụp ảnh để kỷ niệm ở lại với tôi. Thật tuyệt khi có lời nhắc nhở trực quan về những nơi đẹp tôi đã thăm."},
       {band:"9.0",text:"Photography has become an integral part of my travel experience. I meticulously document remarkable scenery to preserve memories that would otherwise fade. These visual records ensure that unforgettable moments remain etched in my consciousness.",vi:"Nhiếp ảnh đã trở thành một phần không thể thiếu trong trải nghiệm du lịch của tôi. Tôi ghi chép tỉ mỉ phong cảnh đáng chú ý để bảo tồn kỷ niệm nếu không sẽ phai nhạt. Những bản ghi trực quan này đảm bảo những khoảnh khắc khó quên vẫn còn khắc sâu trong ý thức của tôi."}
     ],
     explanation:"Band 9.0 dùng 'integral', 'meticulously', 'etched in my consciousness' cho từ vựng tinh tế và cấu trúc phức tạp."}
  ]
},
childhood: {
  name: "Childhood Activities", emoji: "🧒",
  vocab: [
    {word:"lean towards",ipa:"/liːn təˈwɔːdz/",pos:"v",vi:"thiên về, thích hơn",en:"to prefer or favor something",ex:"I lean towards outdoor activities now.",coll:"lean towards something"},
    {word:"break up the routine",ipa:"/breɪk ʌp ðə ruːˈtiːn/",pos:"v",vi:"phá vỡ sự nhàm chán",en:"to do something different from usual",ex:"I go hiking to break up the routine.",coll:"break up the routine/monotony"},
    {word:"a big part of my childhood",ipa:"/ə bɪɡ pɑːt əv maɪ ˈtʃaɪldhʊd/",pos:"n",vi:"phần lớn tuổi thơ",en:"something very important during childhood",ex:"Playing outside was a big part of my childhood.",coll:"a big/huge part of"},
    {word:"grow out of",ipa:"/ɡroʊ aʊt əv/",pos:"v",vi:"lớn lên và bỏ dần",en:"to stop doing something as you get older",ex:"I grew out of playing video games.",coll:"grow out of something"},
    {word:"bond with",ipa:"/bɒnd wɪð/",pos:"v",vi:"gắn kết với",en:"to form a close relationship",ex:"I bonded with my classmates through sports.",coll:"bond with someone/friends"}
  ],
  mcq: [
    {q:"'Lean towards' nghĩa là gì?",opts:["Nghiêng người","Thiên về, thích hơn","Tránh xa","Chạy tới"],ans:1,explain:"'Lean towards' = thiên về, có xu hướng thích. VD: I lean towards reading rather than watching TV."},
    {q:"'Break up the routine' có nghĩa?",opts:["Làm hỏng thói quen","Phá vỡ sự nhàm chán","Ngừng làm việc","Thay đổi lịch trình"],ans:1,explain:"'Break up the routine' = làm điều gì khác thường ngày để bớt nhàm chán."},
    {q:"'A big part of my childhood' nghĩa là?",opts:["Phần buồn nhất tuổi thơ","Phần lớn/quan trọng của tuổi thơ","Khoảng thời gian ngắn","Điều đáng quên"],ans:1,explain:"'A big part of' = một phần quan trọng, chiếm nhiều thời gian trong tuổi thơ."},
    {q:"'Grow out of' có nghĩa gì?",opts:["Phát triển nhanh","Lớn lên và bỏ dần","Trồng cây","Vượt qua khó khăn"],ans:1,explain:"'Grow out of something' = lớn lên và không còn thích/làm điều đó nữa."}
  ],
  fill: [
    {vi:"thiên về, thích hơn",ans:"lean towards",hint:"l___ t___"},
    {vi:"phá vỡ sự nhàm chán",ans:"break up the routine",hint:"b___ up the r___"},
    {vi:"phần lớn tuổi thơ",ans:"a big part of my childhood",hint:"a b___ p___ of my c___"},
    {vi:"gắn kết với",ans:"bond with",hint:"b___ w___"}
  ],
  speaking: [
    {q:"Are there any differences between the activities you liked as a child and now?",
     vocabHint:["lean towards","grow out of","break up the routine"],
     samples:[
       {band:"7.5",text:"Oh, quite a lot actually. As a kid, I was all about outdoor games — I'd spend hours playing tag. But I've grown out of that, and now I lean towards things like reading or going to the gym to break up the routine.",vi:"Ồ, khá nhiều thực ra. Khi còn nhỏ, tôi mê mẩn trò chơi ngoài trời - tôi dành hàng giờ chơi đuổi bắt. Nhưng tôi đã bỏ điều đó, và bây giờ tôi thiên về những thứ như đọc sách hoặc đi phòng gym để phá vỡ sự nhàm chán."},
       {band:"8.0",text:"Definitely, my preferences have evolved significantly. As a child, I was constantly engaged in physical outdoor activities, but I've grown out of that phase. Nowadays, I lean towards more intellectual pursuits that help break up the routine.",vi:"Chắc chắn, sở thích của tôi đã phát triển đáng kể. Khi còn nhỏ, tôi liên tục tham gia hoạt động thể chất ngoài trời, nhưng tôi đã vượt qua giai đoạn đó. Ngày nay, tôi thiên về những hoạt động trí tuệ hơn giúp phá vỡ sự nhàm chán."},
       {band:"9.0",text:"The contrast is quite striking. Childhood activities revolved around unstructured outdoor play, whereas now I consciously lean towards pursuits that provide mental stimulation and effectively break up the monotony of daily routines.",vi:"Sự tương phản khá rõ rệt. Hoạt động tuổi thơ xoay quanh trò chơi ngoài trời không có cấu trúc, trong khi bây giờ tôi có ý thức thiên về những hoạt động mang lại sự kích thích tinh thần và hiệu quả phá vỡ sự đơn điệu của thói quen hàng ngày."}
     ],
     explanation:"Band 9.0 dùng 'evolved significantly', 'consciously lean towards', 'monotony' cho từ vựng tinh tế."},
    {q:"Did you prefer to do activities alone or with a group as a child?",
     vocabHint:["bond with","a big part of my childhood"],
     samples:[
       {band:"7.5",text:"Looking back, I was definitely more of a social butterfly as a kid. Group activities like playing football after school were a big part of my childhood — they really helped me bond with my classmates and build friendships that lasted for years.",vi:"Nhìn lại, tôi chắc chắn là một con bướm xã hội khi còn nhỏ. Hoạt động nhóm như chơi bóng đá sau giờ học là phần lớn tuổi thơ của tôi - chúng thực sự giúp tôi gắn kết với bạn học và xây dựng tình bạn kéo dài hàng năm."},
       {band:"8.0",text:"I was much more inclined towards group activities during my childhood. Team sports and group games constituted a significant part of my early experiences, fostering social bonds that remain important to me today.",vi:"Tôi có khuynh hướng nhiều hơn về hoạt động nhóm trong tuổi thơ. Thể thao đội nhóm và trò chơi nhóm tạo thành phần đáng kể trong trải nghiệm ban đầu của tôi, nuôi dưỡng những mối quan hệ xã hội vẫn quan trọng với tôi ngày nay."},
       {band:"9.0",text:"Group activities predominated during my formative years. Collective endeavors, ranging from team sports to collaborative play, formed an integral component of my childhood, facilitating the development of interpersonal skills and lasting camaraderie.",vi:"Hoạt động nhóm chiếm ưu thế trong những năm hình thành của tôi. Những nỗ lực tập thể, từ thể thao đội nhóm đến trò chơi hợp tác, tạo thành thành phần không thể thiếu trong tuổi thơ của tôi, tạo điều kiện phát triển kỹ năng giao际 và tình đồng chí lâu dài."}
     ],
     explanation:"Band 9.0 dùng 'predominated', 'formative years', 'camaraderie' cho từ vựng học thuật."},
    {q:"What were your favourite activities when you were a child?",
     vocabHint:["a big part of my childhood","bond with"],
     samples:[
       {band:"7.5",text:"Well, if I had to pick one, it'd probably be playing hide and seek in my neighborhood. It was a big part of my childhood and a great way to bond with the other kids on my street. I also loved drawing — I'd spend hours creating my own comic books!",vi:"Chà, nếu phải chọn một, có lẽ là chơi trốn tìm ở khu phố. Đó là phần lớn tuổi thơ của tôi và cách tuyệt vời để gắn kết với lũ trẻ khác trên phố. Tôi cũng thích vẽ - tôi dành hàng giờ tạo ra truyện tranh của riêng mình!"},
       {band:"8.0",text:"Outdoor exploration was definitely my passion. Scouring the neighborhood for adventure, playing with friends, and engaging in imaginative play formed a substantial part of my childhood experiences.",vi:"Khám phá ngoài trời chắc chắn là niềm đam mê của tôi. Tìm kiếm phiêu lưu ở khu phố, chơi với bạn bè, và tham gia trò chơi tưởng tượng tạo thành phần đáng kể trong trải nghiệm tuổi thơ của tôi."},
       {band:"9.0",text:"Unstructured outdoor activities constituted the cornerstone of my childhood enjoyment. Spontaneous games with neighborhood children, coupled with solitary imaginative pursuits, provided a balanced foundation for social and creative development.",vi:"Hoạt động ngoài trời không có cấu trúc tạo thành nền tảng của niềm vui tuổi thơ của tôi. Trò chơi tự phát với trẻ em khu phố, kết hợp với những hoạt động tưởng tượng một mình, mang lại nền tảng cân bằng cho sự phát triển xã hội và sáng tạo."}
     ],
     explanation:"Band 9.0 dùng 'constituted the cornerstone', 'spontaneous', 'balanced foundation' cho cấu trúc phức tạp."},
    {q:"What are your favourite activities?",
     vocabHint:["lean towards","break up the routine"],
     samples:[
       {band:"7.5",text:"At the moment, I'd say I lean towards a mix of physical and creative activities. I go hiking on weekends to break up the routine, and during the week I love curling up with a good book. It keeps life balanced and interesting.",vi:"Hiện tại, tôi nói tôi thiên về sự kết hợp hoạt động thể chất và sáng tạo. Tôi đi bộ đường mòn vào cuối tuần để phá vỡ sự nhàm chán, và trong tuần tôi thích cuộn tròn với một cuốn sách hay. Nó giữ cuộc sống cân bằng và thú vị."},
       {band:"8.0",text:"Currently, I lean towards activities that combine mental stimulation with physical engagement. Reading challenging literature and engaging in outdoor pursuits help break up the routine while providing intellectual and physical benefits.",vi:"Hiện tại, tôi thiên về hoạt động kết hợp kích thích tinh thần với sự tham gia thể chất. Đọc văn học đầy thách thức và tham gia hoạt động ngoài trời giúp phá vỡ sự nhàm chán đồng thời mang lại lợi ích trí tuệ và thể chất."},
       {band:"9.0",text:"My current preferences encompass a diverse array of pursuits. I consciously lean towards intellectually demanding activities complemented by physical endeavors, ensuring a holistic approach that effectively breaks up routine existence.",vi:"Sở thích hiện tại của tôi bao gồm nhiều loại hoạt động đa dạng. Tôi có ý thức thiên về hoạt động đòi hỏi trí tuệ được bổ sung bởi nỗ lực thể chất, đảm bảo cách tiếp cận toàn diện hiệu quả phá vỡ sự tồn tại thường lệ."}
     ],
     explanation:"Band 9.0 dùng 'encompass', 'consciously lean towards', 'holistic approach' cho từ vựng tinh tế."}
  ]
},
building: {
  name: "Building", emoji: "🏢",
  vocab: [
    {word:"the lack of space",ipa:"/ðə læk əv speɪs/",pos:"n",vi:"sự thiếu không gian",en:"not having enough room",ex:"The lack of space in tall buildings can be uncomfortable.",coll:"the lack of space/privacy"},
    {word:"the feeling of being boxed in",ipa:"/ðə ˈfiːlɪŋ əv biːɪŋ bɒkst ɪn/",pos:"n",vi:"cảm giác bị giam cầm",en:"feeling confined or trapped",ex:"Living in a tiny apartment gives you the feeling of being boxed in.",coll:"feel boxed in"},
    {word:"fear of heights",ipa:"/fɪər əv haɪts/",pos:"n",vi:"sợ độ cao",en:"being afraid of high places",ex:"I can't live on high floors due to my fear of heights.",coll:"have a fear of heights"},
    {word:"interesting architecture",ipa:"/ˈɪntrəstɪŋ ˈɑːkɪtektʃər/",pos:"n",vi:"kiến trúc thú vị",en:"buildings with unique design",ex:"I love visiting cities with interesting architecture.",coll:"modern/interesting architecture"},
    {word:"high-rise apartments",ipa:"/haɪ raɪz əˈpɑːtmənts/",pos:"n",vi:"chung cư cao tầng",en:"tall residential buildings",ex:"There are many high-rise apartments in the city center.",coll:"high-rise apartments/buildings"},
    {word:"change the skyline",ipa:"/tʃeɪndʒ ðə ˈskaɪlaɪn/",pos:"v",vi:"thay đổi đường chân trời",en:"to alter the city's horizon view",ex:"New skyscrapers have completely changed the skyline.",coll:"change/transform the skyline"}
  ],
  mcq: [
    {q:"'The feeling of being boxed in' nghĩa là gì?",opts:["Cảm giác vui vẻ","Cảm giác bị giam cầm/chật chội","Cảm giác tự do","Cảm giác an toàn"],ans:1,explain:"'Boxed in' = bị nhốt trong hộp, nghĩa bóng là cảm giác chật chội, bí bách."},
    {q:"'Change the skyline' có nghĩa?",opts:["Thay đổi thời tiết","Thay đổi đường chân trời","Thay đổi màu trời","Thay đổi cảnh quan"],ans:1,explain:"'Skyline' = đường chân trời (hình dáng các tòa nhà khi nhìn từ xa). 'Change the skyline' = xây tòa nhà mới làm thay đổi hình dáng thành phố."},
    {q:"'High-rise apartments' là gì?",opts:["Nhà trệt","Chung cư cao tầng","Biệt thự","Nhà phố"],ans:1,explain:"'High-rise' = cao tầng. 'High-rise apartments' = chung cư/căn hộ cao tầng."},
    {q:"'Fear of heights' mô tả điều gì?",opts:["Sợ bóng tối","Sợ nước","Sợ độ cao","Sợ không gian hẹp"],ans:2,explain:"'Heights' = độ cao. 'Fear of heights' (acrophobia) = chứng sợ độ cao."}
  ],
  fill: [
    {vi:"sự thiếu không gian",ans:"the lack of space",hint:"the l___ of s___"},
    {vi:"cảm giác bị giam cầm",ans:"the feeling of being boxed in",hint:"the f___ of being b___ in"},
    {vi:"sợ độ cao",ans:"fear of heights",hint:"f___ of h___"},
    {vi:"chung cư cao tầng",ans:"high-rise apartments",hint:"h___-r___ a___"},
    {vi:"thay đổi đường chân trời",ans:"change the skyline",hint:"c___ the s___"}
  ],
  speaking: [
    {q:"Do you want to live in a tall building?",
     vocabHint:["the lack of space","the feeling of being boxed in","fear of heights"],
     samples:[
       {band:"5.5",text:"No, I don't want to live in a tall building. I have a <b class='hl'>fear of heights</b>."},
       {band:"6.5",text:"Not really. I'd worry about <b class='hl'>the lack of space</b> and <b class='hl'>the feeling of being boxed in</b>. Plus, I have a bit of a <b class='hl'>fear of heights</b>."},
       {band:"7.5+",text:"To be honest, it's not really my cup of tea. I'd struggle with <b class='hl'>the lack of space</b> and that <b class='hl'>feeling of being boxed in</b>. On top of that, I have a slight <b class='hl'>fear of heights</b>, so living on the 30th floor wouldn't exactly be ideal for me!"}
     ],
     explanation:"'Not my cup of tea' là idiom tự nhiên. Thêm humor ('wouldn't exactly be ideal') cho Band 7.5+."},
    {q:"Is there a building that you would like to visit?",
     vocabHint:["interesting architecture"],
     samples:[
       {band:"5.5",text:"Yes, I want to visit the Eiffel Tower. It has <b class='hl'>interesting architecture</b>."},
       {band:"6.5",text:"I'd love to visit the Sagrada Familia in Barcelona. Its <b class='hl'>interesting architecture</b> is world-famous."},
       {band:"7.5+",text:"Oh, definitely the Sagrada Familia in Barcelona. I've always been fascinated by Gaudí's work, and the <b class='hl'>interesting architecture</b> — with all those organic shapes and stained glass — looks absolutely breathtaking in photos. It's been on my bucket list for years!"}
     ],
     explanation:"Nêu tên cụ thể và lý do chi tiết. 'On my bucket list' là cách nói phổ biến, tự nhiên."},
    {q:"Do you take photos of buildings?",
     vocabHint:["interesting architecture","change the skyline"],
     samples:[
       {band:"5.5",text:"Yes, sometimes I take photos of buildings with <b class='hl'>interesting architecture</b>."},
       {band:"6.5",text:"Yes, whenever I travel. I'm drawn to buildings with <b class='hl'>interesting architecture</b>, especially ones that have <b class='hl'>changed the skyline</b> of a city."},
       {band:"7.5+",text:"I do, actually — especially when traveling. There's something about buildings with <b class='hl'>interesting architecture</b> that makes you want to capture them. I particularly love photographing city skylines and how modern skyscrapers have <b class='hl'>changed the skyline</b> over time."}
     ],
     explanation:"'There's something about... that makes you' là cấu trúc hay cho Band 7.5+."},
    {q:"Are there tall buildings near your home?",
     vocabHint:["high-rise apartments","change the skyline"],

const TOPICS = ['mirror','views','childhood','building','reading','sports'];
let currentSection = 'vocab';
let currentTopic = null;
let currentGame = null; // 'mcq' or 'fill'
let mcqIndex = 0;
let fillIndex = 0;
let mcqScore = 0;
let fillScore = 0;
let mcqAnswered = false;
let fillAnswered = false;
let speakingTopic = null;
let recordings = {};

// ========== NAVIGATION ==========
function showSection(sec) {
  currentSection = sec;
  ['vocab','speaking','list'].forEach(s => {
    document.getElementById('sec-'+s).style.display = s===sec?'block':'none';
    const btn = document.getElementById('nav-'+s);
    if(s===sec){btn.classList.add('active');btn.style.background='';btn.style.color=''}
    else{btn.classList.remove('active');btn.style.background='transparent';btn.style.color='#fff'}
  });
  if(sec==='vocab') renderTopicGrid('vocab');
  if(sec==='speaking') renderTopicGrid('speaking');
  if(sec==='list') renderVocabList();
}

// ========== TOPIC GRID ==========
function renderTopicGrid(mode) {
  const el = document.getElementById('sec-'+mode);
  let h = `<h2 style="font-family:'Nunito',sans-serif;text-align:center;margin:8px 0 16px;color:var(--dark);font-size:22px">${mode==='vocab'?'📚 Chọn Chủ Đề Từ Vựng':'🎤 Chọn Chủ Đề Luyện Nói'}</h2><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">`;
  TOPICS.forEach(t => {
    const d = DATA[t];
    h += `<div class="card topic-card" onclick="${mode==='vocab'?`startVocab('${t}')`:`startSpeaking('${t}')`}" style="text-align:center">
      <div style="font-size:40px;margin-bottom:8px">${d.emoji}</div>
      <div style="font-weight:700;font-size:16px;color:var(--dark)">${d.name}</div>
      <div style="color:var(--gray);font-size:13px;margin-top:4px">${d.vocab.length} từ vựng${mode==='speaking'?' • 4 câu hỏi':''}</div>
    </div>`;
  });
  h += '</div>';
  el.innerHTML = h;
}

// ========== VOCAB GAME ==========
function startVocab(topic) {
  currentTopic = topic;
  currentGame = null;
  mcqIndex = 0; fillIndex = 0; mcqScore = 0; fillScore = 0;
  renderVocabMenu();
}

function renderVocabMenu() {
  const d = DATA[currentTopic];
  const el = document.getElementById('sec-vocab');
  el.innerHTML = `<div style="text-align:center;margin-bottom:16px">
    <button onclick="renderTopicGrid('vocab')" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;font-family:'Quicksand',sans-serif;font-weight:600">← Quay lại</button>
  </div>
  <div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:8px">${d.emoji}</div>
    <h2 style="font-family:'Nunito',sans-serif;color:var(--dark);margin:0 0 16px">${d.name}</h2>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button onclick="startMCQ()" style="background:var(--blue);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Quicksand',sans-serif">🎯 Multiple Choice</button>
      <button onclick="startFill()" style="background:var(--pink);color:#fff;border:none;padding:12px 24px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:'Quicksand',sans-serif">✏️ Fill in the Blank</button>
    </div>
  </div>`;
}

// --- MCQ ---
function startMCQ() {
  currentGame = 'mcq'; mcqIndex = 0; mcqScore = 0; mcqAnswered = false;
  renderMCQ();
}
function renderMCQ() {
  const d = DATA[currentTopic];
  const qs = d.mcq;
  if(mcqIndex >= qs.length) { renderMCQResult(); return; }
  const q = qs[mcqIndex];
  const el = document.getElementById('sec-vocab');
  const prog = ((mcqIndex)/qs.length)*100;
  el.innerHTML = `<div style="text-align:center;margin-bottom:12px">
    <button onclick="renderVocabMenu()" style="background:none;border:none;color:var(--blue);cursor:pointer;font-size:14px;font-family:'Quicksand',sans-serif;font-weight:600">← Quay lại</button>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="badge badge-5">Câu ${mcqIndex+1}/${qs.length}</span>
      <span style="font-weight:700;color:var(--pink)">Điểm: ${mcqScore}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${prog}%"></div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px">
      <h3 style="margin:0;color:var(--dark);font-size:17px;flex:1">${q.q}</h3>
      <button onclick='speakWord(${JSON.stringify(q.q)})' style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:13px">🔊 Speak</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px" id="mcq-opts">
      ${q.opts.map((o,i) => `<button class="opt-btn" id="opt-${i}" onclick="checkMCQ(${i})" style="font-family:'Quicksand',sans-serif;font-size:15px"><span style="font-weight:700;color:var(--blue);margin-right:8px">${'ABCD'[i]}.</span> ${o}</button>`).join('')}
    </div>
    <div id="mcq-explain" style="display:none;margin-top:16px"></div>
  </div>`;
}
function checkMCQ(idx) {
  if(mcqAnswered) return;
  mcqAnswered = true;
  const q = DATA[currentTopic].mcq[mcqIndex];
  const correct = idx === q.ans;
  if(correct) {
    mcqScore++;
    playCorrect();
    launchConfetti();
  } else {
    playWrong();
  }
  document.getElementById('opt-'+idx).classList.add(correct?'correct':'wrong');
  if(!correct) document.getElementById('opt-'+q.ans).classList.add('correct');
  document.getElementById('mcq-explain').style.display = 'block';
  document.getElementById('mcq-explain').innerHTML = `<div class="hint-box">
    <div style="font-weight:700;color:${correct?'#059669':'#dc2626'};margin-bottom:8px">${correct?'✅ Chính xác!':'❌ Sai rồi!'}</div>
    <p style="margin:0;color:var(--dark);font-size:14px">${q.explain}</p>
  </div>
  <button onclick="nextMCQ()" style="margin-top:12px;background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif">Câu tiếp →</button>`;
}
function nextMCQ() { mcqIndex++; mcqAnswered = false; renderMCQ(); }
function renderMCQResult() {
  const total = DATA[currentTopic].mcq.length;
  const pct = Math.round((mcqScore/total)*100);
  document.getElementById('sec-vocab').innerHTML = `<div class="card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:12px">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
    <h2 style="font-family:'Nunito',sans-serif;color:var(--dark)">Kết quả Multiple Choice</h2>
    <div style="font-size:32px;font-weight:800;color:var(--pink);margin:12px 0">${mcqScore}/${total}</div>
    <p style="color:var(--gray)">${pct>=80?'Xuất sắc! Bạn nắm vững từ vựng rồi!':pct>=50?'Khá tốt! Hãy ôn thêm nhé!':'Cần luyện thêm! Đừng bỏ cuộc nhé!'}</p>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button onclick="startMCQ()" style="background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif">🔄 Làm lại</button>
      <button onclick="startFill()" style="background:var(--pink);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif">✏️ Fill in Blank</button>
      <button onclick="renderVocabMenu()" style="background:#e2e8f0;color:var(--dark);border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Quicksand',sans-serif">← Menu</button>
    </div>
  </div>`;
}

function checkFill() {
  if(fillAnswered) return;
  fillAnswered = true;
  const q = DATA[currentTopic].fill[fillIndex];
  const inp = document.getElementById('fill-input');
  const val = inp.value.trim().toLowerCase();
  const correct = val === q.ans.toLowerCase();
  if(correct) {
    fillScore++;
    playCorrect();
    launchConfetti();
  } else {
    playWrong();
  }
  inp.classList.add(correct?'correct':'wrong');
  inp.disabled = true;
  const vocab = DATA[currentTopic].vocab.find(v => v.word.toLowerCase() === q.ans.toLowerCase());
  document.getElementById('fill-explain').style.display = 'block';
  document.getElementById('fill-explain').innerHTML = `<div class="hint-box">
    <div style="font-weight:700;color:${correct?'#059669':'#dc2626'};margin-bottom:8px">${correct?'✅ Chính xác!':'❌ Sai rồi!'}</div>
    <p style="margin:0 0 4px;font-weight:700;color:var(--dark)">Đáp án: ${q.ans}</p>
    ${vocab?`<p style="margin:0 0 4px;color:var(--gray);font-size:13px">${vocab.ipa} • ${vocab.en}</p><p style="margin:0;font-size:13px;color:var(--dark)">📝 ${vocab.ex}</p>`:''}

// ========== MP3 CONVERSION ==========
async function convertToMp3(webmBlob) {
  const arrayBuffer = await webmBlob.arrayBuffer();
  const audioCtx = new AudioContext();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  audioCtx.close();

  const sampleRate = audioBuffer.sampleRate;
  const pcm = audioBuffer.getChannelData(0); // mono
  const int16 = new Int16Array(pcm.length);
  for (let i = 0; i < pcm.length; i++) {
    int16[i] = Math.max(-32768, Math.min(32767, pcm[i] * 32767));
  }

  const encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
  const blockSize = 1152;
  const mp3Parts = [];
  for (let i = 0; i < int16.length; i += blockSize) {
    const chunk = int16.subarray(i, i + blockSize);
    const buf = encoder.encodeBuffer(chunk);
    if (buf.length > 0) mp3Parts.push(new Uint8Array(buf));
  }
  const end = encoder.flush();
  if (end.length > 0) mp3Parts.push(new Uint8Array(end));

  return new Blob(mp3Parts, { type: 'audio/mpeg' });
}

// New recording functions
let mediaRecorder;
let audioChunks = [];
let currentTopicQi = null;

function startRecording(topic, qi) {
  currentTopicQi = `${topic}-${qi}`;
  const recordBtn = document.getElementById(`recordBtn-${topic}-${qi}`);
  const stopBtn = document.getElementById(`stopBtn-${topic}-${qi}`);
  const downloadLink = document.getElementById(`downloadLink-${topic}-${qi}`);

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
      };

      mediaRecorder.onstop = async () => {
        const webmBlob = new Blob(audioChunks, { type: "audio/webm" });

        // Convert WebM → MP3
        const mp3Blob = await convertToMp3(webmBlob);
        const url = URL.createObjectURL(mp3Blob);

        downloadLink.href = url;
        downloadLink.download = `answer-${topic}-${qi}.mp3`;
        downloadLink.style.display = "inline";
        downloadLink.innerText = "⬇ Download MP3";

        localStorage.setItem(`audioURL-${topic}-${qi}`, url);
        const reader = new FileReader();
        reader.onloadend = () => {
          localStorage.setItem(`audioBase64-${topic}-${qi}`, reader.result);
        };
        reader.readAsDataURL(mp3Blob);

        stream.getTracks().forEach(track => track.stop());
        await handleRecordedAudio(topic, qi, webmBlob);
      };

      mediaRecorder.start();
      recordBtn.disabled = true;
      stopBtn.disabled = false;
    })
    .catch(error => {
      console.error("Error accessing microphone:", error);
      alert("Could not access microphone. Please check permissions.");
    });
}

function stopRecording(topic, qi) {
  const recordBtn = document.getElementById(`recordBtn-${topic}-${qi}`);
  const stopBtn = document.getElementById(`stopBtn-${topic}-${qi}`);

  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }

  recordBtn.disabled = false;
  stopBtn.disabled = true;
}

async function handleRecordedAudio(topic, qi, audioBlob) {
  const answerBox = document.getElementById(`answerBox-${topic}-${qi}`);
  const feedbackDiv = document.getElementById(`feedback-${topic}-${qi}`);
  if (!answerBox || !feedbackDiv) return;

  feedbackDiv.style.display = "block";
  feedbackDiv.innerHTML = `<div style="color:var(--gray);">🎙️ Converting speech to text...</div>`;

  const transcript = await speechToText(audioBlob);
  if (!transcript) {
    feedbackDiv.innerHTML = `<div style="color:#dc2626;">Unable to convert audio to text. Please check your Whisper backend.</div>`;
    return;
  }

  answerBox.value = transcript;
  await checkIELTS(transcript, topic, qi);
}

// Save text answer
async function saveAnswer(topic, qi) {
  const answerBox = document.getElementById(`answerBox-${topic}-${qi}`);
  const text = answerBox.value.trim();
  if (!text) {
    alert("Please type or record an answer before saving.");
    return;
  }

  localStorage.setItem(`userAnswer-${topic}-${qi}`, text);

  let answers = JSON.parse(localStorage.getItem("answers") || "[]");
  answers.unshift({
    id: `saved-${Date.now()}-${Math.floor(Math.random()*10000)}`,
    topic,
    qi,
    text,
    savedAt: new Date().toISOString()
  });
  localStorage.setItem("answers", JSON.stringify(answers));

  renderSaved();
  checkGrammar(text, topic, qi);
  await checkIELTS(text, topic, qi);
  alert("Answer saved!");
}

function deleteSavedAnswer(id) {

  const filtered = answers.filter((item) => item.id !== id);
  localStorage.setItem("answers", JSON.stringify(filtered));
  renderSaved();
}

// Grammar and Band checking
function checkGrammar(text, topic, qi) {
  const feedbackDiv = document.getElementById(`feedback-${topic}-${qi}`);
  feedbackDiv.style.display = "block";

  let band = "6.0";
  let grammar = "Some basic errors possible";
  let vocab = "Basic vocabulary used";
  let suggestions = [];

  // Band scoring logic
  if (text.length > 30) {
    band = "7.0";
    grammar = "Generally correct with minor issues";
  }

  if (text.includes("look presentable") || text.includes("compact mirror") || text.includes("come in handy") ||
      text.includes("stick with") || text.includes("drawn to") || text.includes("get the gist") ||
      text.includes("lean towards")) {
    band = "8.0";
    vocab = "Good use of topic-specific vocabulary";
    grammar = "Very good grammar and vocabulary";
  }

  if (text.length > 60 && (text.includes("wouldn't say") || text.includes("actually") || text.includes("for sure") ||
      text.includes("make it a point") || text.includes("tend to"))) {
    band = "9.0";
    grammar = "Excellent grammar and natural expressions";
    vocab = "Advanced vocabulary and collocations";
  }

  // Suggestions
  if (!text.includes("because") && !text.includes("so") && !text.includes("although")) {
    suggestions.push("Use more linking words (because, although, however)");
  }
  if (text.split(' ').length < 20) {
    suggestions.push("Add more details and examples");
  }
  if (!text.match(/[.!?]$/)) {
    suggestions.push("End sentences with proper punctuation");
  }

  feedbackDiv.innerHTML = `
    <h4 style="color:var(--pink);margin-bottom:8px">📊 Evaluation</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <strong>Band Score:</strong> <span style="color:${band >= '8.0' ? 'green' : band >= '7.0' ? 'orange' : 'red'};font-weight:bold">${band}</span>
      </div>
      <div>
        <strong>Word Count:</strong> ${text.split(' ').length} words
      </div>
    </div>
    <div style="margin-bottom:8px">
      <strong>Grammar:</strong> ${grammar}
    </div>
    <div style="margin-bottom:8px">
      <strong>Vocabulary:</strong> ${vocab}
    </div>
    ${suggestions.length > 0 ? `
    <div style="margin-bottom:8px">
      <strong>Suggestions:</strong>
      <ul style="margin:4px 0;padding-left:20px">
        ${suggestions.map(s => `<li>${s}</li>`).join('')}
      </ul>
    </div>
    ` : ''}
    <div style="font-size:12px;color:var(--gray)">
      💾 <strong>Your Answer:</strong> ${text || "No answer saved"}
    </div>
  `;
}

// Speak function for pronunciation
function speakWord(word) {
  if (!word) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(word);

  // Choose a better voice
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang === "en-US" && v.name.toLowerCase().includes("female"));
  if (enVoice) {
    utterance.voice = enVoice;
  } else {
    const fallbackVoice = voices.find(v => v.lang === "en-US");
    if (fallbackVoice) utterance.voice = fallbackVoice;
  }

  utterance.rate = 0.95;
  utterance.pitch = 1;
  speechSynthesis.speak(utterance);
}

function playCorrect() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = 880;
  gain.gain.value = 0.08;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.12);
}

function playWrong() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 220;
  gain.gain.value = 0.12;
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.16);
}

// Speech-to-Text functionality
function startSpeechToText(topic, qi) {
  const answerBox = document.getElementById(`answerBox-${topic}-${qi}`);
  const feedbackDiv = document.getElementById(`feedback-${topic}-${qi}`);

  if (!('webkitSpeechRecognition' in window)) {
    alert('Speech recognition not supported in this browser. Please use Chrome or Edge.');
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = function() {
    answerBox.placeholder = "Listening... Speak now!";
    answerBox.style.borderColor = "var(--pink)";
  };

  recognition.onresult = async function(event) {
    const transcript = event.results[0][0].transcript;
    answerBox.value = transcript;
    answerBox.placeholder = "Type your answer...";
    answerBox.style.borderColor = "#e2e8f0";

    await checkIELTS(transcript, topic, qi);
  };

  recognition.onerror = function(event) {
    console.error('Speech recognition error:', event.error);
    answerBox.placeholder = "Type your answer...";
    answerBox.style.borderColor = "#e2e8f0";
    alert('Speech recognition error. Please try again.');
  };

  recognition.onend = function() {
    answerBox.placeholder = "Type your answer...";
    answerBox.style.borderColor = "#e2e8f0";
  };

  recognition.start();
}

// AI Feedback analysis
// Backend endpoints expected:
// POST /api/whisper  -> returns { text: string }
// POST /api/check-ielts -> returns JSON with band, fluency, vocabulary, grammar, pronunciation, mistakes, improved_answer, translation_vi
// Prompt should follow the IELTS examiner structure (Fluency, Lexical Resource, Grammar, Pronunciation).
async function checkIELTS(text, topic, qi) {
  const feedbackDiv = document.getElementById(`feedback-${topic}-${qi}`);
  if (!feedbackDiv) return;
  feedbackDiv.style.display = "block";
  feedbackDiv.innerHTML = `<div style="color:var(--gray);">🤖 Sending answer to IELTS AI evaluator...</div>`;

  const payload = { answer: text };
  try {
    const response = await fetch("/api/check-ielts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      throw new Error(`AI endpoint returned ${response.status}`);
    }

    const data = await response.json();
    renderAI(data, feedbackDiv);
  } catch (error) {
    console.warn("AI evaluation failed, using local fallback:", error);
    const fallback = fakeIeltsAnalysis(text);
    renderAI(fallback, feedbackDiv, true);
  }
}

async function speechToText(audioBlob) {
  try {
    const formData = new FormData();
    formData.append("file", audioBlob, "audio.webm");
    formData.append("model", "whisper-1");

    const response = await fetch("/api/whisper", {
      method: "POST",
      body: formData
    });

    if (!response.ok) {
      throw new Error(`Whisper endpoint returned ${response.status}`);
    }

    const data = await response.json();
    return data.text || "";
  } catch (error) {
    console.error("Whisper error:", error);
    return "";
  }
}

function renderAI(data, feedbackDiv, fallback = false) {
  const mistakesList = Array.isArray(data.mistakes) ? data.mistakes.map(m => `<li>${m}</li>`).join('') : '';
  feedbackDiv.innerHTML = `
    <h4 style="color:var(--pink);margin-bottom:8px">🎯 IELTS Evaluation ${fallback ? ' (Local fallback)' : ''}</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div>
        <strong>Band Score:</strong> <span style="color:${parseFloat(data.band) >= 8.0 ? 'green' : parseFloat(data.band) >= 7.0 ? 'orange' : 'red'};font-weight:bold">${data.band}</span>
      </div>
      <div>
        <strong>Word Count:</strong> ${data.answer ? data.answer.split(' ').length : 0} words
      </div>
    </div>
    <div style="margin-bottom:8px"><strong>Fluency:</strong> ${data.fluency}</div>
    <div style="margin-bottom:8px"><strong>Vocabulary:</strong> ${data.vocabulary}</div>
    <div style="margin-bottom:8px"><strong>Grammar:</strong> ${data.grammar}</div>
    <div style="margin-bottom:8px"><strong>Pronunciation:</strong> ${data.pronunciation}</div>
    ${mistakesList ? `<div style="margin-bottom:8px"><strong>Mistakes:</strong><ul style="margin:4px 0;padding-left:20px">${mistakesList}</ul></div>` : ''}
    ${data.improved_answer ? `<div style="margin-bottom:8px"><strong>Band 8.5+ sample:</strong><p style="background:#f0f9ff;padding:8px;border-radius:4px;margin:4px 0">${data.improved_answer}</p><button onclick='speakWord(${JSON.stringify(data.improved_answer)})' style="background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:13px">🔊 Listen</button></div>` : ''}
    ${data.translation_vi ? `<div style="font-size:12px;color:var(--gray)"><strong>🇻🇳 Translation:</strong> ${data.translation_vi}</div>` : ''}
  `;
}

function fakeIeltsAnalysis(text) {
  const lower = text.toLowerCase();
  let band = 6.0;
  let fluency = "Fair fluency with occasional hesitation.";
  let vocabulary = "Basic vocabulary; try more topic-specific collocations.";
  let grammar = "Some sentence structure issues present.";
  let pronunciation = "Pronunciation is generally understandable.";
  const mistakes = [];

  if (text.length > 40) band = 7.0;
  if (lower.includes("lean towards") || lower.includes("get the gist") || lower.includes("come in handy")) {
    band = 8.0;
    vocabulary = "Good use of collocations and phrases.";
    grammar = "Mostly accurate grammar.";
  }
  if (text.length > 80 && lower.includes("however") && lower.includes("although")) {
    band = 8.5;
    fluency = "Smooth fluency with good cohesion.";
    grammar = "Strong grammatical control.";
  }
  if (lower.includes("presentable")) {
    pronunciation = "Check the word 'presentable' → /prɪˈzentəbl/.";
  }
  if (lower.includes("gist")) {
    mistakes.push("Check pronunciation of 'gist' → /dʒɪst/.");
  }
  if (lower.includes("towards")) {
    mistakes.push("Check pronunciation of 'towards' → /təˈwɔːdz/.");
  }

  return {
    band: band.toFixed(1),
    fluency,
    vocabulary,
    grammar,
    pronunciation,
    mistakes,
    improved_answer: text ? `I tend to lean towards scanning because it helps me get the gist of the information quickly.` : "",
    translation_vi: text ? "Tôi có xu hướng đọc lướt vì nó giúp tôi nắm được ý chính nhanh chóng." : "",
    answer: text
  };
}

function escapeHtml(str) {
  return str.replace(/[&<>'"]/g, tag => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[tag]));
}
